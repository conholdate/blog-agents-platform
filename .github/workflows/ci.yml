name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  url-validator-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: url-validator/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: url-validator

      - name: Run pytest
        run: python3 -m pytest test_main.py -v
        working-directory: url-validator

  dashboard-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: dashboard

      - name: Run ESLint
        run: npm run lint
        working-directory: dashboard

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: dashboard
